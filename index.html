                    C: "Slide Sorter View",
                    D: "Reading View",
                    E: "Notes Page"
                },
                kunci: "C",
                pembahasan: "Slide Sorter menyusun semua slide dalam bentuk ubin grid kecil sehingga mempermudah pengurutan, duplikasi, atau penghapusan slide."
            },
            {
                id: 41,
                kategori: "MS PowerPoint",
                soal: "Shortcut keyboard yang digunakan untuk mengakhiri atau keluar seketika dari tampilan mode presentasi Slide Show adalah...",
                opsi: {
                    A: "Enter",
                    B: "Spacebar",
                    C: "Esc",
                    D: "Alt + F4",
                    E: "Ctrl + Q"
                },
                kunci: "C",
                pembahasan: "Tombol Escape (Esc) berfungsi menghentikan presentasi layar penuh dan mengembalikan pengguna ke mode penyuntingan kerja biasa."
            },
            {
                id: 42,
                kategori: "MS PowerPoint",
                soal: "Fitur master slide induk yang dipakai untuk merancang tata letak dasar, font, warna, dan placeholder untuk seluruh slide presentasi secara seragam adalah...",
                opsi: {
                    A: "Slide Master",
                    B: "Handout Master",
                    C: "Notes Master",
                    D: "Template Editor",
                    E: "Theme Designer"
                },
                kunci: "A",
                pembahasan: "Slide Master adalah fitur pusat kendali desain presentasi. Setiap perubahan pada Slide Master otomatis memengaruhi seluruh slide lain."
            },
            {
                id: 43,
                kategori: "MS PowerPoint",
                soal: "Shortcut keyboard yang tepat untuk membuat sebuah lembar slide kosong baru (New Slide) di dalam dokumen presentasi aktif adalah...",
                opsi: {
                    A: "Ctrl + N",
                    B: "Ctrl + M",
                    C: "Ctrl + S",
                    D: "Ctrl + O",
                    E: "Ctrl + Shift + N"
                },
                kunci: "B",
                pembahasan: "Ctrl + M menyisipkan slide baru. Sedangkan Ctrl + N digunakan untuk membuat berkas presentasi baru yang benar-benar berbeda."
            },
            {
                id: 44,
                kategori: "MS PowerPoint",
                soal: "Tab menu yang harus dikunjungi apabila pengguna ingin mengganti skema warna tema, gaya latar belakang (background), dan rasio ukuran slide adalah...",
                opsi: {
                    A: "Home",
                    B: "Insert",
                    C: "Design",
                    D: "Transitions",
                    E: "View"
                },
                kunci: "C",
                pembahasan: "Tab Design memuat pengaturan tema bawaan (Themes), varian warna, format background, serta opsi ukuran slide (4:3 atau 16:9)."
            },
            {
                id: 45,
                kategori: "MS PowerPoint",
                soal: "Metode mencetak materi presentasi yang memuat beberapa slide kecil sekaligus dalam satu lembar kertas agar bisa dibagikan ke audiens dinamakan...",
                opsi: {
                    A: "Full Page Slides",
                    B: "Notes Pages",
                    C: "Outline View",
                    D: "Handouts",
                    E: "Double Slides"
                },
                kunci: "D",
                pembahasan: "Handouts mengizinkan cetak banyak slide (misal 2, 3, 4, 6, atau 9 slide) pada selembar kertas untuk catatan audiens."
            },
            {
                id: 46,
                kategori: "MS PowerPoint",
                soal: "Wadah kotak bergaris putus-putus pada tata letak slide baru yang berfungsi menampung konten seperti judul, teks, atau gambar disebut...",
                opsi: {
                    A: "Text Box",
                    B: "Placeholder",
                    C: "Frame Card",
                    D: "Bounding Box",
                    E: "Smart Block"
                },
                kunci: "B",
                pembahasan: "Placeholder adalah kontainer bawaan template layout yang bertugas menampung tipe-tipe data objek tertentu di slide."
            },
            {
                id: 47,
                kategori: "MS PowerPoint",
                soal: "Shortcut keyboard untuk menyajikan Slide Show mulai dari slide aktif yang saat ini sedang kita pilih/sunting adalah...",
                opsi: {
                    A: "F5",
                    B: "Shift + F5",
                    C: "Alt + F5",
                    D: "Ctrl + F5",
                    E: "Spacebar"
                },
                kunci: "B",
                pembahasan: "Kombinasi Shift + F5 sangat berguna untuk menguji animasi slide yang sedang dikerjakan tanpa harus melihat dari slide awal."
            },
            {
                id: 48,
                kategori: "MS PowerPoint",
                soal: "Efek animasi pada PowerPoint dibagi menjadi beberapa kategori utama berikut ini, KECUALI...",
                opsi: {
                    A: "Entrance",
                    B: "Emphasis",
                    C: "Exit",
                    D: "Motion Paths",
                    E: "Transition"
                },
                kunci: "E",
                pembahasan: "Transition merupakan efek antar halaman slide, sedangkan kategori animasi objek internal adalah Entrance (Masuk), Emphasis (Penekanan), Exit (Keluar), dan Motion Paths (Jalur Gerak)."
            },
            {
                id: 49,
                kategori: "MS PowerPoint",
                soal: "Fitur yang dimanfaatkan untuk merekam suara narasi presentasi seiring dengan berjalannya perpindahan slide presentasi adalah...",
                opsi: {
                    A: "Record Slide Show",
                    B: "Audio Converter",
                    C: "Screen Recorder",
                    D: "Voice Over Tool",
                    E: "Audacity Hook"
                },
                kunci: "A",
                pembahasan: "Record Slide Show merekam suara narasi, pointer laser, dan durasi slide untuk disimpan dan diputar kembali saat presentasi otomatis dijalankan."
            },
            {
                id: 50,
                kategori: "MS PowerPoint",
                soal: "Shortcut keyboard yang paling cepat untuk menduplikasi secara langsung objek terpilih atau halaman slide presentasi aktif adalah...",
                opsi: {
                    A: "Ctrl + C",
                    B: "Ctrl + V",
                    C: "Ctrl + D",
                    D: "Ctrl + M",
                    E: "Ctrl + Y"
                },
                kunci: "C",
                pembahasan: "Ctrl + D (Duplicate) menyalin sekaligus menempel objek/slide dalam sekali pencet, lebih efisien dibanding menyalin manual (Ctrl+C & Ctrl+V)."
            }
        ];

        // --- COMPONENT APP ---
        function App() {
            // STATE MANAGEMENT
            const [mode, setMode] = useState("auth"); // 'auth', 'test', 'result', 'review'
            const [student, setStudent] = useState({ nama: "", kelas: "" });
            const [timerMode, setTimerMode] = useState("timer_on"); // 'timer_on' (60m) or 'timer_off'
            const [timeLeft, setTimeLeft] = useState(3600); // 60 menit dalam detik
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); // format: { [soalId]: "A" }
            const [flagged, setFlagged] = useState({}); // format: { [soalId]: true }
            const [score, setScore] = useState(0);
            const [examDuration, setExamDuration] = useState(0); // waktu terpakai
            const [errors, setErrors] = useState({ nama: false, kelas: false });

            // Timer Effect
            useEffect(() => {
                let interval = null;
                if (mode === "test" && timerMode === "timer_on") {
                    interval = setInterval(() => {
                        setTimeLeft((prev) => {
                            if (prev <= 1) {
                                clearInterval(interval);
                                finishExam();
                                return 0;
                            }
                            setExamDuration((d) => d + 1);
                            return prev - 1;
                        });
                    }, 1000);
                } else if (mode === "test" && timerMode === "timer_off") {
                    interval = setInterval(() => {
                        setExamDuration((d) => d + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [mode, timerMode]);

            // Form Submit / Mulai Ujian
            const handleStart = (e) => {
                e.preventDefault();
                const errs = {
                    nama: student.nama.trim() === "",
                    kelas: student.kelas.trim() === ""
                };
                setErrors(errs);

                if (!errs.nama && !errs.kelas) {
                    setAnswers({});
                    setFlagged({});
                    setCurrentQIndex(0);
                    setTimeLeft(3600);
                    setExamDuration(0);
                    setMode("test");
                }
            };

            // Format Timer: HH:MM:SS atau MM:SS
            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            // Simpan Jawaban
            const handleSelectOption = (key) => {
                const soalId = SOAL_DATABASE[currentQIndex].id;
                setAnswers(prev => ({
                    ...prev,
                    [soalId]: key
                }));
            };

            // Toggle Ragu-ragu (Flag)
            const toggleFlag = () => {
                const soalId = SOAL_DATABASE[currentQIndex].id;
                setFlagged(prev => ({
                    ...prev,
                    [soalId]: !prev[soalId]
                }));
            };

            // Selesai Ujian
            const finishExam = () => {
                // Kalkulasi Nilai
                let correctCount = 0;
                SOAL_DATABASE.forEach(item => {
                    if (answers[item.id] === item.kunci) {
                        correctCount++;
                    }
                });
                const finalScore = Math.round((correctCount / SOAL_DATABASE.length) * 100);
                setScore(finalScore);
                setMode("result");
            };

            // Dapatkan Statistik Kategori
            const getCategoryStats = () => {
                const stats = {
                    "MS Word": { total: 0, correct: 0 },
                    "MS Excel": { total: 0, correct: 0 },
                    "MS PowerPoint": { total: 0, correct: 0 }
                };

                SOAL_DATABASE.forEach(item => {
                    const cat = item.kategori;
                    stats[cat].total++;
                    if (answers[item.id] === item.kunci) {
                        stats[cat].correct++;
                    }
                });

                return stats;
            };

            // Reset Ujian Baru
            const resetExam = () => {
                setStudent({ nama: "", kelas: "" });
                setMode("auth");
            };

            const stats = getCategoryStats();
            const answeredCount = Object.keys(answers).length;

            return (
                <div class="flex-grow flex flex-col">
                    {/* TOP DECORATIVE HEADER */}
                    <header class="bg-blue-600 text-white shadow-lg py-4 px-6 flex justify-between items-center no-print">
                        <div class="flex items-center gap-3">
                            <div class="bg-white p-2 rounded-lg text-blue-600 flex items-center justify-center">
                                <i class="fa-solid fa-graduation-cap text-2xl"></i>
                            </div>
                            <div>
                                <h1 class="text-xl font-bold tracking-tight">Portal CBT</h1>
                                <p class="text-xs text-blue-100 font-medium">Ujian Produktif Aplikasi Perkantoran</p>
                            </div>
                        </div>
                        {mode === "test" && (
                            <div class="flex items-center gap-4 bg-blue-700 py-1.5 px-4 rounded-full text-sm font-semibold border border-blue-500">
                                <span class="flex items-center gap-2">
                                    <i class="fa-regular fa-clock text-base animate-pulse text-amber-300"></i>
                                    {timerMode === "timer_on" ? "SISA WAKTU:" : "WAKTU BERJALAN:"}
                                </span>
                                <span class="text-amber-300 text-lg font-mono tracking-wider">
                                    {timerMode === "timer_on" ? formatTime(timeLeft) : formatTime(examDuration)}
                                </span>
                            </div>
                        )}
                    </header>

                    {/* ================= STAGE 1: AUTHENTICATION FORM ================= */}
                    {mode === "auth" && (
                        <div class="flex-grow flex items-center justify-center p-6 bg-slate-100">
                            <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg border border-slate-200">
                                <div class="text-center mb-8">
                                    <span class="inline-block bg-blue-100 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full mb-3 uppercase tracking-wider">Registrasi Ujian</span>
                                    <h2 class="text-2xl font-bold text-slate-800">Ujian Online MS Office</h2>
                                    <p class="text-slate-500 text-sm mt-1">Isi identitas diri di bawah ini dengan benar untuk memulai ujian.</p>
                                </div>

                                <form onSubmit={handleStart} class="space-y-6">
                                    <div>
                                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                                            <i class="fa-regular fa-user mr-2 text-blue-500"></i>Nama Lengkap
                                        </label>
                                        <input 
                                            type="text" 
                                            placeholder="Masukkan Nama Lengkap Anda" 
                                            value={student.nama}
                                            onChange={(e) => setStudent({...student, nama: e.target.value})}
                                            class={`w-full px-4 py-3 rounded-xl border ${errors.nama ? 'border-red-500 ring-2 ring-red-100' : 'border-slate-300 focus:border-blue-500 focus:ring-4 focus:ring-blue-100'} outline-none transition duration-200 font-medium`}
                                        />
                                        {errors.nama && <span class="text-xs text-red-500 mt-1 font-medium block">Nama lengkap wajib diisi!</span>}
                                    </div>

                                    <div>
                                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                                            <i class="fa-solid fa-hotel mr-2 text-blue-500"></i>Kelas / Rombel
                                        </label>
                                        <input 
                                            type="text" 
                                            placeholder="Contoh: X - RPL 1 atau XII - IPS 3" 
                                            value={student.kelas}
                                            onChange={(e) => setStudent({...student, kelas: e.target.value})}
                                            class={`w-full px-4 py-3 rounded-xl border ${errors.kelas ? 'border-red-500 ring-2 ring-red-100' : 'border-slate-300 focus:border-blue-500 focus:ring-4 focus:ring-blue-100'} outline-none transition duration-200 font-medium`}
                                        />
                                        {errors.kelas && <span class="text-xs text-red-500 mt-1 font-medium block">Kelas wajib diisi!</span>}
                                    </div>

                                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                        <span class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Pengaturan Timer</span>
                                        <div class="grid grid-cols-2 gap-3">
                                            <button 
                                                type="button"
                                                onClick={() => setTimerMode("timer_on")}
                                                class={`py-2.5 px-3 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 border transition ${timerMode === "timer_on" ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100'}`}
                                            >
                                                <i class="fa-solid fa-hourglass-start"></i>60 Menit
                                            </button>
                                            <button 
                                                type="button"
                                                onClick={() => setTimerMode("timer_off")}
                                                class={`py-2.5 px-3 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 border transition ${timerMode === "timer_off" ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100'}`}
                                            >
                                                <i class="fa-solid fa-infinity"></i>Santai (No Timer)
                                            </button>
                                        </div>
                                    </div>

                                    <div class="bg-amber-50 p-4 rounded-xl border border-amber-200 flex gap-3 text-amber-800 text-xs leading-relaxed">
                                        <i class="fa-solid fa-circle-info text-base mt-0.5 text-amber-600 shrink-0"></i>
                                        <div>
                                            <strong class="font-semibold block mb-0.5">Informasi Ujian:</strong>
                                            Ujian ini terdiri dari 50 soal pilihan ganda (A, B, C, D, E) mencakup materi dasar MS Word, MS Excel, dan MS PowerPoint. Pastikan koneksi internet stabil sebelum menekan tombol mulai.
                                        </div>
                                    </div>

                                    <button 
                                        type="submit" 
                                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold transition shadow-lg hover:shadow-blue-200 text-center block focus:ring-4 focus:ring-blue-200"
                                    >
                                        Mulai Ujian Sekarang <i class="fa-solid fa-arrow-right ml-2"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ================= STAGE 2: TEST INTERFACE ================= */}
                    {mode === "test" && (
                        <div class="flex-grow grid grid-cols-1 lg:grid-cols-4 gap-6 p-6 bg-slate-100 no-print">
                            {/* Left Area: Main Question Panel */}
                            <div class="lg:col-span-3 flex flex-col gap-6">
                                {/* Student Info Bar */}
                                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center justify-between">
                                    <div class="flex items-center gap-4">
                                        <div class="h-10 w-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-bold">
                                            {student.nama.charAt(0).toUpperCase()}
                                        </div>
                                        <div>
                                            <h3 class="font-bold text-slate-800">{student.nama}</h3>
                                            <p class="text-xs text-slate-500">Kelas: <span class="font-semibold text-slate-700">{student.kelas}</span></p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="text-xs font-semibold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
                                            Soal ke <strong class="text-slate-800">{currentQIndex + 1}</strong> dari <strong class="text-slate-800">50</strong>
                                        </span>
                                        <span class="text-xs font-semibold text-emerald-700 bg-emerald-50 px-3 py-1.5 rounded-lg border border-emerald-200">
                                            Terjawab: <strong class="text-emerald-800">{answeredCount}</strong>
                                        </span>
                                    </div>
                                </div>

                                {/* Active Question Card */}
                                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 flex-grow flex flex-col justify-between min-h-[450px]">
                                    <div>
                                        {/* Tag Kategori Soal */}
                                        <div class="flex justify-between items-center mb-6">
                                            <span class={`px-3 py-1 rounded-full text-xs font-bold tracking-wider uppercase ${
                                                SOAL_DATABASE[currentQIndex].kategori === 'MS Word' ? 'bg-blue-100 text-blue-700' :
                                                SOAL_DATABASE[currentQIndex].kategori === 'MS Excel' ? 'bg-emerald-100 text-emerald-700' :
                                                'bg-rose-100 text-rose-700'
                                            }`}>
                                                <i class={`mr-1.5 ${
                                                    SOAL_DATABASE[currentQIndex].kategori === 'MS Word' ? 'fa-regular fa-file-word' :
                                                    SOAL_DATABASE[currentQIndex].kategori === 'MS Excel' ? 'fa-regular fa-file-excel' :
                                                    'fa-regular fa-file-powerpoint'
                                                }`}></i>
                                                {SOAL_DATABASE[currentQIndex].kategori}
                                            </span>
                                            {flagged[SOAL_DATABASE[currentQIndex].id] && (
                                                <span class="bg-amber-100 text-amber-800 text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1">
                                                    <i class="fa-solid fa-flag"></i> Ragu-ragu
                                                </span>
                                            )}
                                        </div>

                                        {/* Soal Text */}
                                        <h2 class="text-lg md:text-xl font-semibold text-slate-800 leading-relaxed mb-8">
                                            {SOAL_DATABASE[currentQIndex].soal}
                                        </h2>

                                        {/* Pilihan Ganda (A, B, C, D, E) */}
                                        <div class="space-y-4">
                                            {Object.entries(SOAL_DATABASE[currentQIndex].opsi).map(([key, value]) => {
                                                const isSelected = answers[SOAL_DATABASE[currentQIndex].id] === key;
                                                return (
                                                    <button
                                                        key={key}
                                                        onClick={() => handleSelectOption(key)}
                                                        class={`w-full text-left p-4 rounded-xl border flex items-center gap-4 transition duration-150 ${
                                                            isSelected 
                                                            ? 'border-blue-600 bg-blue-50 text-blue-900 font-medium ring-2 ring-blue-100' 
                                                            : 'border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-700'
                                                        }`}
                                                    >
                                                        <span class={`h-8 w-8 rounded-lg flex items-center justify-center font-bold border shrink-0 transition ${
                                                            isSelected
                                                            ? 'bg-blue-600 text-white border-blue-600'
                                                            : 'bg-white text-slate-500 border-slate-300'
                                                        }`}>
                                                            {key}
                                                        </span>
                                                        <span class="text-sm md:text-base leading-snug">{value}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Action Buttons */}
                                    <div class="mt-8 pt-6 border-t border-slate-100 flex flex-wrap gap-3 justify-between items-center">
                                        <div class="flex gap-3">
                                            <button 
                                                onClick={() => setCurrentQIndex(prev => Math.max(0, prev - 1))}
                                                disabled={currentQIndex === 0}
                                                class="px-5 py-3 rounded-xl border border-slate-300 hover:bg-slate-50 font-semibold text-slate-700 disabled:opacity-40 disabled:hover:bg-transparent transition text-sm flex items-center gap-2"
                                            >
                                                <i class="fa-solid fa-chevron-left text-xs"></i> Sebelumnya
                                            </button>
                                            
                                            <button 
                                                onClick={toggleFlag}
                                                class={`px-5 py-3 rounded-xl font-semibold transition text-sm flex items-center gap-2 border ${
                                                    flagged[SOAL_DATABASE[currentQIndex].id]
                                                    ? 'bg-amber-600 text-white border-amber-600 hover:bg-amber-700'
                                                    : 'bg-amber-50 text-amber-700 border-amber-200 hover:bg-amber-100'
                                                }`}
                                            >
                                                <i class="fa-solid fa-flag text-xs"></i> Ragu-Ragu
                                            </button>
                                        </div>

                                        {currentQIndex < SOAL_DATABASE.length - 1 ? (
                                            <button 
                                                onClick={() => setCurrentQIndex(prev => prev + 1)}
                                                class="px-6 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold transition text-sm flex items-center gap-2 shadow-md hover:shadow-blue-100"
                                            >
                                                Selanjutnya <i class="fa-solid fa-chevron-right text-xs"></i>
                                            </button>
                                        ) : (
                                            <button 
                                                onClick={finishExam}
                                                class="px-6 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold transition text-sm flex items-center gap-2 shadow-md hover:shadow-emerald-100"
                                            >
                                                Selesai Ujian <i class="fa-solid fa-circle-check text-sm"></i>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Right Area: Navigation Grid (50 Questions) */}
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between h-fit lg:sticky lg:top-6">
                                <div>
                                    <h3 class="font-bold text-slate-800 text-base mb-2 flex items-center justify-between">
                                        <span>Navigasi Soal</span>
                                        <span class="text-xs bg-slate-100 px-2.5 py-1 rounded-full text-slate-600 font-medium">{answeredCount}/50 Terjawab</span>
                                    </h3>
                                    <p class="text-xs text-slate-500 mb-4">Klik nomor untuk melompati halaman soal secara instan.</p>

                                    {/* Grid Layout */}
                                    <div class="grid grid-cols-5 gap-2 max-h-[360px] overflow-y-auto pr-1">
                                        {SOAL_DATABASE.map((item, index) => {
                                            const isCurrent = currentQIndex === index;
                                            const isAnswered = answers[item.id] !== undefined;
                                            const isFlagged = flagged[item.id];

                                            let btnClass = "bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100";
                                            if (isAnswered) btnClass = "bg-emerald-600 text-white border-emerald-600 hover:bg-emerald-700";
                                            if (isFlagged) btnClass = "bg-amber-500 text-white border-amber-500 hover:bg-amber-600";
                                            if (isCurrent) btnClass = "bg-blue-600 text-white border-blue-600 ring-4 ring-blue-100";

                                            return (
                                                <button
                                                    key={item.id}
                                                    onClick={() => setCurrentQIndex(index)}
                                                    class={`h-10 w-full rounded-lg border font-bold text-xs flex items-center justify-center transition ${btnClass}`}
                                                >
                                                    {index + 1}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Legend Status */}
                                <div class="mt-6 pt-6 border-t border-slate-100 space-y-2.5">
                                    <span class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Keterangan Warna</span>
                                    <div class="grid grid-cols-2 gap-2 text-xs">
                                        <div class="flex items-center gap-2 text-slate-600">
                                            <span class="h-3 w-3 bg-slate-100 border border-slate-300 rounded block"></span> Belum Isi
                                        </div>
                                        <div class="flex items-center gap-2 text-slate-600">
                                            <span class="h-3 w-3 bg-emerald-600 rounded block"></span> Terjawab
                                        </div>
                                        <div class="flex items-center gap-2 text-slate-600">
                                            <span class="h-3 w-3 bg-amber-500 rounded block"></span> Ragu-ragu
                                        </div>
                                        <div class="flex items-center gap-2 text-slate-600">
                                            <span class="h-3 w-3 bg-blue-600 rounded block"></span> Sedang Aktif
                                        </div>
                                    </div>

                                    {/* Selesai Ujian Button di Sidebar */}
                                    <button 
                                        onClick={finishExam}
                                        class="w-full mt-4 bg-red-50 hover:bg-red-100 border border-red-200 text-red-700 font-bold py-3 rounded-xl transition text-xs flex items-center justify-center gap-2 shadow-sm"
                                    >
                                        <i class="fa-solid fa-power-off text-xs"></i> Hentikan & Kirim Jawaban
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ================= STAGE 3: RESULTS PANEL ================= */}
                    {mode === "result" && (
                        <div class="flex-grow p-6 bg-slate-100">
                            <div class="max-w-4xl mx-auto space-y-6">
                                {/* Result Summary Header */}
                                <div class="bg-white p-8 rounded-2xl shadow-md border border-slate-200 text-center relative overflow-hidden">
                                    {/* Background decorative vector */}
                                    <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-50 rounded-full -z-10 opacity-60"></div>
                                    <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-indigo-50 rounded-full -z-10 opacity-60"></div>

                                    <span class="inline-block bg-emerald-100 text-emerald-800 text-xs font-extrabold px-3 py-1 rounded-full mb-4 uppercase tracking-wider">
                                        <i class="fa-solid fa-square-poll-vertical mr-1"></i> Hasil Evaluasi
                                    </span>
                                    
                                    <h2 class="text-3xl font-extrabold text-slate-800">Ujian Telah Selesai</h2>
                                    <p class="text-slate-500 text-sm mt-1 mb-6">Berikut adalah rangkuman nilai pencapaian uji kompetensi MS Office Anda.</p>

                                    {/* Score Circle */}
                                    <div class="inline-flex flex-col items-center justify-center h-40 w-40 rounded-full bg-slate-50 border-8 border-blue-600 shadow-inner mb-6">
                                        <span class="text-5xl font-extrabold text-slate-800 tracking-tight">{score}</span>
                                        <span class="text-xs text-slate-400 font-bold tracking-wider uppercase mt-1">NILAI AKHIR</span>
                                    </div>

                                    {/* Student Identity Meta */}
                                    <div class="max-w-md mx-auto grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100 text-left text-sm mb-6">
                                        <div>
                                            <span class="text-xs text-slate-400 font-medium uppercase block">Nama Peserta</span>
                                            <span class="font-bold text-slate-800">{student.nama}</span>
                                        </div>
                                        <div>
                                            <span class="text-xs text-slate-400 font-medium uppercase block">Kelas / Rombel</span>
                                            <span class="font-bold text-slate-800">{student.kelas}</span>
                                        </div>
                                        <div class="col-span-2 pt-2 border-t border-slate-200 flex justify-between text-xs text-slate-500 font-medium">
                                            <span>Waktu Penyelesaian: <strong class="text-slate-800">{formatTime(examDuration)}</strong></span>
                                            <span>Predikat: <strong class="text-blue-600">{score >= 75 ? "LULUS / KOMPETEN" : "REMIDIAL / BELUM KOMPETEN"}</strong></span>
                                        </div>
                                    </div>

                                    {/* Print Button & Try Again */}
                                    <div class="flex justify-center gap-3 no-print">
                                        <button 
                                            onClick={() => window.print()}
                                            class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-xl transition flex items-center gap-2 shadow-md"
                                        >
                                            <i class="fa-solid fa-print"></i> Cetak Hasil Ujian
                                        </button>
                                        <button 
                                            onClick={() => setMode("review")}
                                            class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-3 rounded-xl transition flex items-center gap-2 shadow-md"
                                        >
                                            <i class="fa-solid fa-list-check"></i> Ulas Jawaban
                                        </button>
                                        <button 
                                            onClick={resetExam}
                                            class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 font-semibold px-6 py-3 rounded-xl transition"
                                        >
                                            Ulangi Dari Awal
                                        </button>
                                    </div>
                                </div>

                                {/* Category Performance Bars */}
                                <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                                    <h3 class="font-bold text-slate-800 text-lg mb-4 flex items-center gap-2">
                                        <i class="fa-solid fa-chart-line text-blue-600"></i> Analisis Kemampuan Per Modul
                                    </h3>
                                    <div class="space-y-6">
                                        {Object.entries(stats).map(([category, data]) => {
                                            const percent = Math.round((data.correct / data.total) * 100) || 0;
                                            
                                            // Color schemes
                                            let barColor = "bg-blue-500";
                                            let icon = "fa-regular fa-file-word text-blue-500";
                                            if (category === "MS Excel") {
                                                barColor = "bg-emerald-500";
                                                icon = "fa-regular fa-file-excel text-emerald-500";
                                            } else if (category === "MS PowerPoint") {
                                                barColor = "bg-rose-500";
                                                icon = "fa-regular fa-file-powerpoint text-rose-500";
                                            }

                                            return (
                                                <div key={category} class="space-y-2">
                                                    <div class="flex justify-between items-center text-sm font-semibold">
                                                        <span class="flex items-center gap-2 text-slate-700">
                                                            <i class={icon}></i> {category}
                                                        </span>
                                                        <span class="text-slate-500">
                                                            {data.correct} / {data.total} Benar ({percent}%)
                                                        </span>
                                                    </div>
                                                    <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                                        <div class={`h-full ${barColor} rounded-full transition-all duration-1000`} style={{ width: `${percent}%` }}></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Clean Print Area (Hanya Muncul saat cetak menggunakan window.print()) */}
                                <div class="hidden print-only p-8 bg-white text-black border border-black max-w-4xl mx-auto space-y-6">
                                    <div class="text-center border-b-2 border-black pb-4">
                                        <h1 class="text-2xl font-extrabold uppercase">Laporan Hasil Evaluasi Uji Kompetensi</h1>
                                        <h2 class="text-lg font-bold">Mata Pelajaran Teknologi Perkantoran (MS Office)</h2>
                                    </div>
                                    <table class="w-full text-sm border-collapse my-6">
                                        <tbody>
                                            <tr>
                                                <td class="font-bold py-2 w-1/3">Nama Lengkap Peserta</td>
                                                <td class="py-2">: {student.nama}</td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold py-2">Kelas / Rombel</td>
                                                <td class="py-2">: {student.kelas}</td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold py-2">Waktu Pengerjaan</td>
                                                <td class="py-2">: {formatTime(examDuration)}</td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold py-2">Nilai Akhir (Skala 100)</td>
                                                <td class="py-2">: <span class="text-xl font-bold">{score}</span></td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold py-2">Status Penilaian</td>
                                                <td class="py-2">: <span class="font-bold">{score >= 75 ? "LULUS / KOMPETEN" : "BELUM KOMPETEN"}</span></td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <div class="border-t border-slate-300 pt-6">
                                        <h3 class="font-bold mb-3">Detail Analisis Materi:</h3>
                                        {Object.entries(stats).map(([category, data]) => (
                                            <div key={category} class="flex justify-between py-1.5 border-b border-slate-100 text-sm">
                                                <span>{category}</span>
                                                <span class="font-semibold">{data.correct} Benar dari {data.total} Soal ({Math.round((data.correct / data.total) * 100) || 0}%)</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div class="flex justify-between pt-16 text-center text-sm">
                                        <div>
                                            <p class="mb-14">Guru Pengampu,</p>
                                            <p class="font-bold underline">......................................</p>
                                        </div>
                                        <div>
                                            <p class="mb-14">Siswa Peserta Ujian,</p>
                                            <p class="font-bold underline">{student.nama}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ================= STAGE 4: DETAILED ANSWER REVIEW ================= */}
                    {mode === "review" && (
                        <div class="flex-grow p-6 bg-slate-100 no-print">
                            <div class="max-w-4xl mx-auto space-y-6">
                                {/* Navigation and back to dashboard */}
                                <div class="flex items-center justify-between">
                                    <button 
                                        onClick={() => setMode("result")}
                                        class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 font-semibold px-4 py-2.5 rounded-xl transition text-sm flex items-center gap-2"
                                    >
                                        <i class="fa-solid fa-arrow-left"></i> Kembali ke Hasil Nilai
                                    </button>
                                    <span class="text-sm font-bold text-slate-600">Ulasan Jawaban ({answeredCount}/50)</span>
                                </div>

                                {/* Review List Cards */}
                                <div class="space-y-6">
                                    {SOAL_DATABASE.map((item, index) => {
                                        const userAnswer = answers[item.id];
                                        const isCorrect = userAnswer === item.kunci;

                                        return (
                                            <div key={item.id} class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                                                {/* Header info */}
                                                <div class="flex justify-between items-start gap-4 mb-4">
                                                    <div class="flex items-center gap-2">
                                                        <span class="h-6 w-6 bg-slate-100 text-slate-700 text-xs font-bold rounded flex items-center justify-center">
                                                            {index + 1}
                                                        </span>
                                                        <span class={`px-2.5 py-0.5 rounded text-[10px] font-bold uppercase ${
                                                            item.kategori === 'MS Word' ? 'bg-blue-100 text-blue-700' :
                                                            item.kategori === 'MS Excel' ? 'bg-emerald-100 text-emerald-700' :
                                                            'bg-rose-100 text-rose-700'
                                                        }`}>
                                                            {item.kategori}
                                                        </span>
                                                    </div>
                                                    
                                                    {userAnswer === undefined ? (
                                                        <span class="text-xs bg-amber-100 text-amber-800 px-3 py-1 rounded-full font-bold">
                                                            <i class="fa-solid fa-circle-exclamation mr-1"></i> Tidak Dijawab
                                                        </span>
                                                    ) : isCorrect ? (
                                                        <span class="text-xs bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-bold">
                                                            <i class="fa-solid fa-circle-check mr-1"></i> Benar
                                                        </span>
                                                    ) : (
                                                        <span class="text-xs bg-red-100 text-red-800 px-3 py-1 rounded-full font-bold">
                                                            <i class="fa-solid fa-circle-xmark mr-1"></i> Salah
                                                        </span>
                                                    )}
                                                </div>

                                                {/* Question Text */}
                                                <h4 class="font-semibold text-slate-800 leading-relaxed mb-4">{item.soal}</h4>

                                                {/* Show options with color feedback */}
                                                <div class="space-y-2 mb-4">
                                                    {Object.entries(item.opsi).map(([key, value]) => {
                                                        const isKunci = item.kunci === key;
                                                        const isUser = userAnswer === key;

                                                        let optionStyle = "border-slate-100 text-slate-700 bg-slate-50/50";
                                                        if (isKunci) optionStyle = "border-emerald-500 bg-emerald-50 text-emerald-900 font-semibold ring-1 ring-emerald-500";
                                                        if (isUser && !isCorrect) optionStyle = "border-red-400 bg-red-50 text-red-900";

                                                        return (
                                                            <div key={key} class={`p-3 rounded-lg border text-xs md:text-sm flex items-center gap-3 ${optionStyle}`}>
                                                                <span class={`h-6 w-6 rounded flex items-center justify-center font-bold text-xs shrink-0 ${
                                                                    isKunci ? 'bg-emerald-600 text-white' :
                                                                    isUser && !isCorrect ? 'bg-red-500 text-white' :
                                                                    'bg-slate-200 text-slate-600'
                                                                }`}>
                                                                    {key}
                                                                </span>
                                                                <span>{value}</span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>

                                                {/* Pembahasan / Rationale */}
                                                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 text-xs md:text-sm text-blue-800 leading-relaxed">
                                                    <strong class="font-bold block mb-1">
                                                        <i class="fa-solid fa-lightbulb text-amber-500 mr-1.5 animate-pulse"></i> Pembahasan:
                                                    </strong>
                                                    {item.pembahasan}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <div class="text-center pt-4">
                                    <button 
                                        onClick={() => setMode("result")}
                                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-xl shadow-md"
                                    >
                                        Kembali ke Hasil Nilai
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer class="bg-slate-900 text-slate-400 py-6 text-center text-xs mt-auto border-t border-slate-800 no-print">
                        <p>© 2026 Portal CBT Ujian Online MS Office. All Rights Reserved.</p>
                        <p class="mt-1 text-slate-600">Dikembangkan untuk Evaluasi Belajar Mandiri Interaktif.</p>
                    </footer>
                </div>
            );
        }

        // RENDER APPLICATION
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
